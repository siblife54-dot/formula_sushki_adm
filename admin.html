<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админка курса</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="admin.css" />
  <link href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css" rel="stylesheet">
</head>
<body data-page="admin">
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="admin-sidebar__top">
        <h1>Админка курса</h1>
        <p id="adminCourseLabel">Загрузка...</p>
      </div>

      <button id="addLessonBtn" class="btn btn-primary" type="button">+ Добавить урок</button>

      <div id="lessonsList" class="admin-lessons-list"></div>
    </aside>

    <main class="admin-main">
      <div id="editorEmpty" class="admin-empty">
        Выберите урок слева
      </div>

      <div id="editorPanel" hidden>
        <div class="admin-editor-header">
          <h2 id="editorLessonTitle">Урок</h2>
          <button id="saveLessonBtn" class="btn btn-primary" type="button">Сохранить</button>
        </div>

        <div class="admin-form">
          <label>
            Lesson ID
            <input id="lessonIdInput" type="text" />
          </label>

          <label>
            День
            <input id="dayNumberInput" type="number" />
          </label>

          <label>
            Заголовок
            <input id="titleInput" type="text" />
          </label>

          <label>
            Подзаголовок
            <input id="subtitleInput" type="text" />
          </label>
        </div>

        <hr />

        <div class="admin-blocks-header">
          <h3>Блоки урока</h3>
          <button id="addBlockBtn" class="btn btn-primary" type="button">+ Добавить блок</button>
        </div>

        <div class="admin-rich-editor" id="richEditorWrap" hidden>
          <h3>Редактор блока</h3>

          <h4>Текст</h4>
          <div id="quillEditor" style="height: 260px; background: #fff; color: #111;"></div>
          <div style="margin-top: 12px;">
            <button id="saveRichBlockBtn" class="btn btn-primary" type="button">Сохранить текст</button>
          </div>

          <div class="admin-block-video" style="margin-top: 20px;">
            <h4>Видео</h4>
            <button id="addVideoToggleBtn" class="btn btn-primary" type="button">+ Добавить видео</button>
            <div id="videoForm" hidden style="margin-top: 8px;">
              <label for="videoIdInput">Video ID (Kinescope)</label>
              <input id="videoIdInput" type="text" placeholder="Например: 5qYpGTvDTbrLMBeBL6hpN1" />
              <p class="admin-hint">Ссылка генерируется автоматически: https://kinescope.io/embed/{ID}</p>
              <button id="saveVideoBtn" class="btn btn-primary" type="button">Сохранить видео</button>
            </div>
            <div id="videoCard" style="margin-top: 10px;"></div>
          </div>

          <div class="admin-block-files" style="margin-top: 20px;">
            <h4>Файлы</h4>
            <button id="addFileToggleBtn" class="btn btn-primary" type="button">+ Добавить файл</button>
            <div id="fileForm" hidden style="margin-top: 8px;">
              <label for="fileLabelInput">Название файла</label>
              <input id="fileLabelInput" type="text" placeholder="Например: File1.pdf" />
              <label for="fileIdInput">Google Drive file_id</label>
              <input id="fileIdInput" type="text" placeholder="Например: 1abcDEF..." />
              <button id="saveFileBtn" class="btn btn-primary" type="button">Сохранить файл</button>
            </div>
            <div id="filesList" style="margin-top: 10px;"></div>
          </div>
        </div>

        <div id="blocksList" class="admin-blocks-list"></div>
      </div>
    </main>
  </div>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.min.js"></script>
  <script src="admin.js"></script>
</body>
</html>
